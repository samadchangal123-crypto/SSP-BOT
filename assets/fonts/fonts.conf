<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir prefix="default">.</dir>
  <dir>/usr/share/fonts</dir>
  <cachedir prefix="xdg">fontconfig</cachedir>
  <cachedir>/tmp/fontconfig-cache</cachedir>

  <config>
    <rescan><int>30</int></rescan>
  </config>

  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans Symbols</family>
      <family>Noto Sans Symbols2</family>
      <family>Noto Sans Math</family>
      <family>Noto Sans Egyptian Hieroglyphs</family>
      <family>Noto Sans Thai</family>
      <family>Noto Color Emoji</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias>
    <family>Arial Black</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
  <alias>
    <family>Impact</family>
    <accept><family>Noto Sans</family></accept>
  </alias>
</fontconfig>
